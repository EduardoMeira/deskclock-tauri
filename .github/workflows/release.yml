name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Criar como rascunho?'
        type: boolean
        default: true

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: Linux
          - platform: windows-latest
            label: Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Dependências do sistema (Linux) ────────────────────────────────
      - name: Instalar dependências do sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libayatana-appindicator3-dev

      # ── Node + pnpm ────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Rust ───────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Instalar dependências JS ───────────────────────────────────────
      - run: pnpm install

      # ── Testes antes de buildar ────────────────────────────────────────
      - run: pnpm tsc --noEmit
      - run: pnpm test

      # ── Build Tauri + publicar release ────────────────────────────────
      - uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          VITE_GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DeskClock ${{ github.ref_name }}'
          releaseBody: |
            ## DeskClock ${{ github.ref_name }}

            ### Instalação

            | Plataforma | Arquivo |
            |---|---|
            | Windows | `.msi` ou `.exe` (NSIS) |
            | Ubuntu / Debian | `.deb` |
            | Linux (universal) | `.AppImage` |

            Consulte o [README](https://github.com/${{ github.repository }}#build) para instruções detalhadas.
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
          updaterJsonPreferNsis: true
